events {}

http {
  server {
    listen 80;

    location /users {
      proxy_pass http://user-service:3000;
    }

    location /products {
      proxy_pass http://product-service:8000;
    }

    location /health {
      return 200 'gateway ok\n';
      add_header Content-Type text/plain;
    }
  }
}
