version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      retries: 5

  user-service:
    build: ./user-service
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: ecommerce
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  product-service:
    build: ./product-service
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  gateway:
    image: nginx:alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - user-service
      - product-service

volumes:
  pgdata:
